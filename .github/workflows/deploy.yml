name: Deploy React Dashboard to DigitalOcean

on:
    push:
        branches:
            - "main"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout the repository
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20.15"

            - name: Install Dependencies
              run: |
                  export NODE_OPTIONS=--max-old-space-size=4096
                  npm install --frozen-lockfile

            - name: Build Vite Project
              run: |
                  export NODE_OPTIONS=--max-old-space-size=4096
                  npx vite build

            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: vite-build-dist
                  path: dist/

    deploy:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download Build Artifact
              uses: actions/download-artifact@v4
              with:
                  name: vite-build-dist
                  path: dist/

            - name: Set up SSH to DigitalOcean
              uses: webfactory/ssh-agent@v0.8.0
              with:
                  ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}

            - name: Add DigitalOcean Host Key
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

            - name: Deploy Vite Build to DigitalOcean
              env:
                  DO_HOST: ${{ secrets.DO_HOST }}
                  DO_USER: ${{ secrets.DO_USER }}
                  ENV_VARS_JSON: ${{ secrets.ENV_VARS_JSON }}
              run: |
                  # Create directory on DO droplet if it doesn't exist
                  ssh $DO_USER@$DO_HOST "mkdir -p ~/applications/dashboard/dist"

                  # Upload only the Vite build (dist folder)
                  rsync -avz dist/ $DO_USER@$DO_HOST:~/applications/dashboard/dist/

                  # Optional: Add/update .env file if needed
                  ssh $DO_USER@$DO_HOST "echo '$ENV_VARS_JSON' > ~/applications/dashboard/.env"

                  # Restart Nginx
                  ssh $DO_USER@$DO_HOST "sudo systemctl restart nginx"
